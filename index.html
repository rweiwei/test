<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>日本行 2026</title>
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--surface:#16213e;--primary:#e94560;--accent:#0f3460;--text:#eaeaea;--text2:#8899aa;--border:#2a2a4a;--success:#4ade80;--warning:#fbbf24}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:80px}
header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:48px 20px 24px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.4)}
header h1{font-size:24px;font-weight:800;letter-spacing:1px}
header h1 span{color:var(--primary)}
header p{font-size:13px;color:var(--text2);margin-top:4px}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin:12px 16px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--success));border-radius:2px;transition:width .3s ease;width:0}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:100px;z-index:99;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs button{flex:1;padding:12px;border:none;background:transparent;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;position:relative;white-space:nowrap}
.tabs button.active{color:var(--primary)}
.tabs button.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:var(--primary);border-radius:3px 3px 0 0}
.tab-content{display:none;padding:12px}
.tab-content.active{display:block}
.day-card{background:var(--card);border-radius:16px;margin-bottom:12px;overflow:hidden;border:1px solid var(--border);transition:all .2s}
.day-card:active{transform:scale(.98)}
.day-header{display:flex;align-items:center;padding:14px 16px;cursor:pointer;gap:12px;user-select:none;-webkit-tap-highlight-color:transparent}
.day-num{background:var(--primary);color:#fff;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.day-meta{flex:1;min-width:0}
.day-meta h2{font-size:15px;font-weight:700}
.day-meta .sub{font-size:12px;color:var(--text2)}
.day-icon{font-size:28px;flex-shrink:0}
.arrow{color:var(--text2);font-size:18px;transition:transform .3s;flex-shrink:0}
.arrow.open{transform:rotate(180deg)}
.day-body{display:none;padding:0 16px 16px}
.day-body.open{display:block}
.slot{border-left:3px solid var(--primary);padding-left:12px;margin:12px 0}
.slot.later{border-left-color:var(--warning)}
.slot.evening{border-left-color:var(--accent)}
.slot.flex{border-left-color:var(--success)}
.slot h3{font-size:14px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.slot p{font-size:13px;color:var(--text2);margin:2px 0}
.food-item{background:var(--surface);border-radius:10px;padding:10px 12px;margin:6px 0;display:flex;align-items:center;gap:10px;font-size:13px}
.food-item a{color:var(--primary);text-decoration:none;font-weight:600;white-space:nowrap}
.food-item a:hover{text-decoration:underline}
.food-item .price{color:var(--success);font-weight:600;font-size:12px}
.food-item .tag{background:var(--accent);color:var(--text);padding:2px 8px;border-radius:6px;font-size:11px;white-space:nowrap}
.transport{background:var(--surface);border-radius:10px;padding:10px 12px;margin:6px 0;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px}
.transport .icon{font-size:16px}
.note{background:rgba(233,69,96,.1);border:1px solid rgba(233,69,96,.3);border-radius:10px;padding:10px 12px;margin:6px 0;font-size:13px;display:flex;align-items:flex-start;gap:8px}
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.food-grid .food-item{flex-direction:column;text-align:center;gap:4px}
.food-grid .food-item a{white-space:normal}
.transport-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin:8px 0}
.transport-card h3{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.transport-card .row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border)}
.transport-card .row:last-child{border-bottom:none}
.transport-card .row span{color:var(--text2)}
.transport-card .row strong{color:var(--text)}
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--border)}
.timeline-item{position:relative;padding:6px 0 6px 16px;font-size:13px}
.timeline-item::before{content:'';position:absolute;left:-2px;top:10px;width:10px;height:10px;border-radius:50%;background:var(--primary);border:2px solid var(--bg)}
.timeline-item.alt::before{background:var(--warning)}
.timeline-item h4{font-weight:600;font-size:14px}
.timeline-item p{color:var(--text2)}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.summary-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.summary-item .num{font-size:28px;font-weight:800;color:var(--primary)}
.summary-item .label{font-size:12px;color:var(--text2);margin-top:2px}
footer{padding:20px;text-align:center;color:var(--text2);font-size:12px}
@media(max-width:480px){.food-grid{grid-template-columns:1fr}}
</style>
</head>

function renderItinerary(){
  const c=document.getElementById('daysContainer');
  c.innerHTML='';
  data.days.forEach((d,i)=>{
    const card=document.createElement('div');
    card.className='day-card';
    card.innerHTML=`
      <div class="day-header" onclick="toggleDay(${i})">
        <div class="day-num">D${d.day}</div>
        <div class="day-meta">
          <h2>Day ${d.day}｜${d.date} ${d.week}</h2>
          <div class="sub">${d.icon} ${d.title}</div>
        </div>
        <span class="arrow" id="arrow${i}">▾</span>
      </div>
      <div class="day-body" id="body${i}">
        ${d.slots.map(s=>`
          <div class="slot ${s.type==='evening'?'evening':s.type==='flex'?'flex':'main'}">
            <h3>${s.label}</h3>
            ${s.items.map(t=>`<p>${t}</p>`).join('')}
          </div>
        `).join('')}
        ${d.foods.length?`
          <div style="margin:8px 0;font-size:13px;font-weight:600;color:var(--success)">🍜 順路美食</div>
          <div class="food-grid">
            ${d.foods.map(f=>`
              <div class="food-item">
                <a href="${f.url}" target="_blank">${f.name}</a>
                <span class="price">${f.price}</span>
                <span class="tag">${f.tag}</span>
              </div>
            `).join('')}
          </div>
        `:''}
        <div class="transport">
          <span class="icon">🚃</span> ${d.transport.replace(/\n/g,'<br>')}
        </div>
      </div>
    `;
    c.appendChild(card);
  });
}

function toggleDay(i){
  const body=document.getElementById('body'+i);
  const arrow=document.getElementById('arrow'+i);
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function renderFood(){
  const c=document.getElementById('foodContainer');
  c.innerHTML='';
  data.days.forEach(d=>{
    if(!d.foods.length) return;
    const card=document.createElement('div');
    card.className='day-card';
    card.style.borderLeft=`4px solid var(--primary)`;
    card.innerHTML=`
      <div class="day-header" style="cursor:default">
        <div class="day-meta">
          <h2>Day ${d.day}｜${d.date} ${d.week} ${d.icon} ${d.title}</h2>
        </div>
      </div>
      <div style="padding:0 16px 16px">
        <div class="food-grid">
          ${d.foods.map(f=>`
            <div class="food-item">
              <a href="${f.url}" target="_blank">${f.name}</a>
              <span class="price">${f.price}</span>
              <span class="tag">${f.tag}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    c.appendChild(card);
  });
  if(!c.children.length) c.innerHTML='<p style="text-align:center;color:var(--text2);padding:40px">🍜 尚無美食推薦～</p>';
}

function renderTransport(){
  const c=document.getElementById('transportContainer');
  c.innerHTML=`
    <div class="day-card" style="padding:16px;margin-bottom:16px;border-left:4px solid var(--success)">
      <h2 style="font-size:16px;margin-bottom:8px">📍 巢鴨基地（Day 5-12）</h2>

    <div class="day-card" style="padding:16px;margin-top:16px;border-left:4px solid var(--warning)">

document.querySelectorAll('.tabs button').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('tab-'+this.dataset.tab).classList.add('active');
  });
});

</script>
