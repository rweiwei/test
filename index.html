<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>日本行 2026</title>
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--surface:#16213e;--primary:#e94560;--accent:#0f3460;--text:#eaeaea;--text2:#8899aa;--border:#2a2a4a;--success:#4ade80;--warning:#fbbf24;--orange:#f97316;--purple:#a78bfa}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:100px}
header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);padding:48px 20px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.4)}
header h1{font-size:24px;font-weight:800;letter-spacing:1px}
header h1 span{color:var(--primary)}
header p{font-size:13px;color:var(--text2);margin-top:4px}
.progress{height:3px;background:var(--border);border-radius:2px;margin:10px 16px 0;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--success));border-radius:2px;transition:width .3s;width:0}

/* Tabs */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:92px;z-index:99}
.tabs button{flex:1;padding:10px 8px;border:none;background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;position:relative;white-space:nowrap}
.tabs button.active{color:var(--primary)}
.tabs button.active::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:3px;background:var(--primary);border-radius:3px 3px 0 0}
.tab-content{display:none;padding:10px}
.tab-content.active{display:block}

/* Day Card */
.day-card{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid var(--border)}
.day-header{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:10px;user-select:none;-webkit-tap-highlight-color:transparent}
.day-num{background:var(--primary);color:#fff;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0}
.day-meta{flex:1;min-width:0}
.day-meta h2{font-size:14px;font-weight:700}
.day-meta .sub{font-size:11px;color:var(--text2)}
.day-icon{font-size:24px;flex-shrink:0}
.arrow{color:var(--text2);font-size:16px;transition:transform .3s;flex-shrink:0}
.arrow.open{transform:rotate(180deg)}

/* Route badge on collapsed card */
.route-badge{font-size:11px;background:var(--surface);padding:4px 8px;border-radius:8px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;flex-shrink:0}
.route-badge .line{color:var(--success);font-weight:600}
.route-badge .time{color:var(--orange)}

.day-body{display:none;padding:0 14px 14px}
.day-body.open{display:block}

.slot{border-left:3px solid var(--primary);padding-left:10px;margin:10px 0}
.slot.evening{border-left-color:var(--purple)}
.slot h3{font-size:13px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.slot p{font-size:12px;color:var(--text2);margin:2px 0}

/* Transport section inside day card - prominent */
.day-transport{background:linear-gradient(135deg,#0d2818 0%,#16213e 100%);border:1px solid #1a4a2e;border-radius:10px;padding:12px;margin:10px 0}
.day-transport .title{font-size:12px;color:var(--success);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.trans-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:12px;color:var(--text)}
.trans-row .dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0}
.trans-row .dot.end{background:var(--primary)}
.trans-row .station{font-weight:600}
.trans-row .info{color:var(--text2);font-size:11px;margin-left:auto}

/* Food */
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.food-item{background:var(--surface);border-radius:8px;padding:8px 10px;text-align:center;font-size:12px}
.food-item a{color:var(--primary);text-decoration:none;font-weight:600;display:block;margin-bottom:3px}
.food-item a:hover{text-decoration:underline}
.food-item .price{color:var(--success);font-weight:600;font-size:11px}
.food-item .tag{background:var(--accent);color:var(--text);padding:1px 6px;border-radius:5px;font-size:10px;display:inline-block;margin-top:3px}

/* Transport Tab - redesigned */
.transport-tab-header{padding:4px 0 14px}
.base-selector{display:flex;gap:8px;margin-bottom:12px}
.base-btn{flex:1;padding:10px;border-radius:10px;border:2px solid var(--border);background:transparent;color:var(--text2);font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;text-align:center}
.base-btn.active{border-color:var(--success);color:var(--success);background:rgba(74,222,128,.1)}
.base-btn.inactive{border-color:var(--primary);color:var(--primary);background:rgba(233,69,96,.1)}

.route-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.route-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative;overflow:hidden}
.route-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--success);border-radius:0 4px 4px 0}
.route-card .dest{font-size:14px;font-weight:700;margin-bottom:2px}
.route-card .dest small{font-size:11px;color:var(--text2);font-weight:400}
.route-card .line-info{font-size:12px;color:var(--text2);margin:2px 0}
.route-card .time-big{font-size:20px;font-weight:800;color:var(--success);margin-top:4px}
.route-card .time-big small{font-size:11px;color:var(--text2);font-weight:400}

.long-route-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:8px}
.long-route-card h3{font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.long-route-card .step{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
.long-route-card .step .arrow-icon{color:var(--text2)}

/* FAB */
.fab{position:fixed;bottom:100px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(233,69,96,.4);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.fab:active{transform:scale(.9)}

/* Transport Overlay */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:300;animation:fadeIn .2s}
.overlay.open{display:block}
.overlay-content{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;padding:20px;max-height:80vh;overflow-y:auto;animation:slideUp .3s}
.overlay-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.overlay-header h2{font-size:16px}
.overlay-close{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:4px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

footer{padding:16px;text-align:center;color:var(--text2);font-size:11px}

@media(max-width:480px){.route-grid{grid-template-columns:1fr}.food-grid{grid-template-columns:1fr}}
</style>
</head>

function renderDays(){
  const c=document.getElementById('daysContainer');
  days.forEach((d,i)=>{
    let routeText=d.tr.map(r=>r.line||r.st).filter(Boolean).join(' → ');
    const card=document.createElement('div');
    card.className='day-card';
    card.innerHTML=`
      <div class="day-header" onclick="toggleDay(${i})">
        <div class="day-num">D${d.d}</div>
        <div class="day-meta">
          <h2>Day ${d.d}｜${d.date} ${d.wk}</h2>
          <div class="sub">${d.icon} ${d.title}</div>
        </div>
        <div class="route-badge">
          <span class="line">${d.route.split('→')[0]}</span>
          <span class="time">→ ${d.route.split('→').pop()}</span>
        </div>
        <span class="arrow" id="a${i}">▾</span>
      </div>
      <div class="day-body" id="b${i}">
        ${d.slot.map(s=>`
          <div class="slot${s.c?' '+s.c:''}">
            <h3>${s.l}</h3>
            <p>${s.t}</p>
          </div>
        `).join('')}
        ${d.food.length?`
          <div style="margin:8px 0;font-size:12px;font-weight:600;color:var(--success)">🍜 順路美食</div>
          <div class="food-grid">
            ${d.food.map(f=>`
              <div class="food-item">
                <a href="${f.u}" target="_blank">${f.n}</a>
                <span class="price">${f.p}</span>
                <span class="tag">${f.t}</span>
              </div>
            `).join('')}
          </div>
        `:''}
        <div class="day-transport">
          <div class="title">🚃 交通路線</div>
          ${d.tr.map((r,j)=>{
            if(!r.line&&!r.st) return '';
            const isLast=r.last||j===d.tr.length-1;
            const isEmpty=!r.line;
            return isEmpty
              ? `<div style="text-align:center;font-size:11px;color:var(--text2);padding:1px 0">${r.st}</div>`
              : `<div class="trans-row">
                  <span class="dot${isLast?' end':''}"></span>
                  <span class="station">${r.st}</span>
                  <span class="info">${r.line}</span>
                </div>`;
          }).join('')}
        </div>
      </div>
    `;
    c.appendChild(card);
  });
}

function toggleDay(i){
  const b=document.getElementById('b'+i);
  const a=document.getElementById('a'+i);
  b.classList.toggle('open');
  a.classList.toggle('open');
}

function renderFood(){
  const c=document.getElementById('foodContainer');
  days.forEach(d=>{
    if(!d.food.length) return;
    const card=document.createElement('div');
    card.className='day-card';
    card.style.borderLeft='4px solid var(--primary)';
    card.innerHTML=`
      <div class="day-header" style="cursor:default">
        <div class="day-meta">
          <h2>Day ${d.d}｜${d.date} ${d.wk} ${d.icon} ${d.title}</h2>
        </div>
      </div>
      <div style="padding:0 14px 14px">
        <div class="food-grid">
          ${d.food.map(f=>`
            <div class="food-item">
              <a href="${f.u}" target="_blank">${f.n}</a>
              <span class="price">${f.p}</span>
              <span class="tag">${f.t}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    c.appendChild(card);
  });
  if(!c.children.length) c.innerHTML='<p style="text-align:center;color:var(--text2);padding:40px;font-size:14px">🍜 美食資料整理中～</p>';
}

function renderTransport(){
  const c=document.getElementById('transportContainer');
  c.innerHTML=`
    <div class="transport-tab-header">
      <div class="base-selector">
        <div class="base-btn active" id="baseSugamo" onclick="setBase('sugamo')">📍 巢鴨基地</div>
        <div class="base-btn" id="baseOtsuka" onclick="setBase('otsuka')">📍 大塚基地</div>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:8px">👆 選擇你現在的住宿基地</div>
      <div id="baseRoutes"></div>
    </div>
  `;
  renderBaseRoutes('sugamo');
}

function setBase(b){
  document.querySelectorAll('.base-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById(b==='sugamo'?'baseSugamo':'baseOtsuka').classList.add('active');
  renderBaseRoutes(b);
}

function renderBaseRoutes(b){
  const routes=b==='sugamo'?baseNerima:baseOtsuka;
  const label=b==='sugamo'?'巢鴨':'大塚';
  const c=document.getElementById('baseRoutes');
  c.innerHTML=`
    <div class="route-grid">
      ${routes.map(r=>`
        <div class="route-card">
          <div class="dest">
            ${r.to.split('(')[0]}
            ${r.to.includes('(')?`<small>${r.to.match(/\((.+)\)/)?.[1]||''}</small>`:''}
          </div>
          <div class="line-info">${r.line}</div>
          <div class="time-big">${r.time} <small>到著</small></div>
          <div style="margin-top:6px">
            <a href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(label+'駅')}&destination=${encodeURIComponent(r.to.replace(/[（(][^）)]*[）)]/,'').trim()+(r.to.match(/[（(]([^）)]*)[）)]/)?.[1]?' '+r.to.match(/[（(]([^）)]*)[）)]/)[1]:''))}&travelmode=transit" target="_blank" style="font-size:11px;color:var(--primary);text-decoration:none">🗺️ 路線</a>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="long-route-card">
      <h3>✈️ 成田空港</h3>
      <div class="step"><span>🚄 去程：</span><span>Skyliner 40分 → 日暮里 → 山手線5分 → 大塚</span></div>
      <div class="step"><span>🚄 回程：</span><span>巢鴨 → 山手線8分 → 上野 → Skyliner 40分 → 成田（17:00出發）</span></div>
    </div>
    <div class="long-route-card">
      <h3>🚌 長距離移動</h3>
      <div class="step"><span>🏔️ 御殿場 Outlet：</span><span>巢鴨 → 山手線 → 新宿 → 🚌高速巴士 1.5hr</span></div>
      <div class="step"><span>🏪 跳蚤市場→台場：</span><span>大井競馬場前 → 東京モノレール → 天王洲アイル → りんかい線 → 東京テレポート</span></div>
    </div>
  `;
}

function gmUrl(to,b){
  let dest=to.replace(/[（(][^）)]*[）)]/,'').trim();
  let hint=to.match(/[（(]([^）)]*)[）)]/)?.[1];
  let place=hint?dest+' '+hint:dest;
  return `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent((b||'巢鴨')+'駅')}&destination=${encodeURIComponent(place)}&travelmode=transit`;
}
function renderOverlayRoutes(){
  const c=document.getElementById('overlayRoutes');
  const all=[...new Set([...baseNerima,...baseOtsuka].map(r=>r.to))];
  c.innerHTML=`
    <div style="margin-bottom:10px;font-size:13px;color:var(--text2)">📍 從 <strong style="color:var(--text)">巢鴨</strong> 出發（電車時間） — 點擊卡片打開 Google Maps 查即時班次</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      ${baseNerima.map(r=>`
        <a href="${gmUrl(r.to)}" target="_blank" rel="noopener" style="background:var(--surface);border-radius:8px;padding:10px;text-align:center;text-decoration:none;color:inherit;display:block">
          <div style="font-size:16px;font-weight:700">${r.to.split('(')[0]}</div>
          <div style="font-size:11px;color:var(--text2)">${r.line}</div>
          <div style="font-size:18px;font-weight:800;color:var(--success);margin-top:2px">${r.time}</div>
        </a>
      `).join('')}
    </div>
  `;
}

function openOverlay(){document.getElementById('overlay').classList.add('open');renderOverlayRoutes();}
function closeOverlay(){document.getElementById('overlay').classList.remove('open');}

document.querySelectorAll('.tabs button').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('tab-'+this.dataset.tab).classList.add('active');
  });
});

renderDays();
renderFood();
renderTransport();
</script>
</body>
